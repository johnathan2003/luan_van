# docker-compose.yml
services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: shopvn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopvn_user
      POSTGRES_PASSWORD: shopvn_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopvn_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopvn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopvn_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # bind mount — sửa code local là container thấy ngay
      - ./super/backend:/app/super  # superadmin module — tách biệt, không thuộc app package
      - /app/uploads            # giữ uploads trong container, không bị mount đè
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── Database (PostgreSQL)
      DB_HOST: db
      DB_PORT: 5432
      
      DB_USER: shopvn_user
      DB_PASSWORD: shopvn_pass
      DB_NAME: ecommerce_db
      DATABASE_URL: postgresql://shopvn_user:shopvn_pass@db:5432/ecommerce_db
      DIRECT_URL: postgresql://shopvn_user:shopvn_pass@db:5432/ecommerce_db
      # ── Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      # ── JWT
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      # ── Server
      DEBUG: "True"
      ENVIRONMENT: development
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: INFO
      # ── Superadmin (plaintext, không dùng bcrypt)
      SUPER_USERNAME: super
      SUPER_PASSWORD: super

  # ── Adminer ────────────────────────────────────────────────
  adminer:
    image: adminer
    container_name: shopvn_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data: