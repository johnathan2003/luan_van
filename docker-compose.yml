version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: shopvn_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: shopvn_user
      MYSQL_PASSWORD: shopvn_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopvn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend          # ← FastAPI backend
      dockerfile: Dockerfile
    container_name: shopvn_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: shopvn_user
      DB_PASSWORD: shopvn_pass
      DB_NAME: ecommerce_db
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend          # ← React TS frontend
      dockerfile: Dockerfile
    container_name: shopvn_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
